services:
  api:
    labels:
      traefik.enable: "true"
      traefik.http.routers.nexio-api.rule: Host(`${APP_DOMAIN}`) && (PathPrefix(`/v1`) || Path(`/healthz`) || Path(`/readyz`))
      traefik.http.routers.nexio-api.entrypoints: websecure
      traefik.http.routers.nexio-api.priority: "100"
      traefik.http.routers.nexio-api.tls.certresolver: letsencrypt
      traefik.http.services.nexio-api.loadbalancer.server.port: "8080"

  web:
    labels:
      traefik.enable: "true"
      traefik.http.routers.nexio-web.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.nexio-web.entrypoints: websecure
      traefik.http.routers.nexio-web.priority: "1"
      traefik.http.routers.nexio-web.tls.certresolver: letsencrypt
      traefik.http.services.nexio-web.loadbalancer.server.port: "3000"

  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    depends_on:
      - web
      - api
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

volumes:
  traefik_letsencrypt:
